{{ define "main" }}
<div class="posts">
  <h1>{{ .Title }}</h1>
  <ul>
    {{ range .Paginator.Pages }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "02-01-2006" }}</time>
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
