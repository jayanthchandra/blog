{{ define "main" }}
<article class="post">
  <h1>{{ .Title }}</h1>
  <div class="content">
    {{ .Content }}
  </div>
  {{ if eq .Section "posts" }}
  <div class="meta">
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
    {{ with .Params.tags }}
    &middot;
    {{ range $i, $tag := . }}
      {{ if $i }}, {{ end }}<a href="{{ "tags/" | relURL }}{{ $tag | urlize }}/">{{ $tag }}</a>
    {{ end }}
    {{ end }}
  </div>
  {{ end }}
</article>
{{ end }}
